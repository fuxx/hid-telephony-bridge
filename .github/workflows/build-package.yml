name: Build AUR Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git python pipewire-pulse

      - uses: actions/checkout@v4

      - name: Prepare PKGBUILD
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

          # Download the release tarball and compute checksum
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${TAG}.tar.gz"
          curl -sL "$TARBALL_URL" -o "mv7-hid-bridge-${TAG}.tar.gz"
          SHA256=$(sha256sum "mv7-hid-bridge-${TAG}.tar.gz" | cut -d' ' -f1)
          echo "TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

          # Patch PKGBUILD with real version and checksum
          sed -i "s/^pkgver=.*/pkgver=$TAG/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" PKGBUILD

      - name: Build package
        run: |
          # makepkg refuses to run as root
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg -s --noconfirm"

      - name: Generate .SRCINFO and checksums
        run: |
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

          # Collect integrity info for local verification
          {
            echo "# mv7-hid-bridge v${VERSION} — build checksums"
            echo "# Generated by CI at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Verify these match your local build before pushing to AUR"
            echo ""
            echo "source_tarball_sha256=${TARBALL_SHA256}"
            echo ""
            echo "# Package file checksums:"
            sha256sum mv7-hid-bridge-*.pkg.tar.zst
            echo ""
            echo "# PKGBUILD checksum:"
            sha256sum PKGBUILD
            echo ""
            echo "# .SRCINFO checksum:"
            sha256sum .SRCINFO
          } > checksums.txt

          cat checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mv7-hid-bridge-${{ env.VERSION }}
          path: |
            PKGBUILD
            .SRCINFO
            mv7-hid-bridge.install
            checksums.txt
            mv7-hid-bridge-*.pkg.tar.zst
          retention-days: 90
